name: nowcast

on:
  schedule:
    # 02:05 UTC weekdays = 12:05 Sydney (AEST) / 13:05 (AEDT) — safely after
    # the ABS 11:30 Sydney release window year-round (GitHub cron is UTC and
    # can jitter by several minutes).
    - cron: "5 2 * * 1-5"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "data/manual/nab/**"

permissions:
  contents: write
  pages: write
  id-token: write

# One run at a time; a NAB upload arriving mid-run queues rather than collides.
concurrency:
  group: nowcast
  cancel-in-progress: false

jobs:
  nowcast:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/Library
          key: rlibs-${{ runner.os }}-v2

      - name: Install R packages (Posit binary CRAN)
        env:
          R_LIBS_USER: ${{ runner.temp }}/Library
        run: |
          mkdir -p "$R_LIBS_USER"
          Rscript -e 'need <- c("readabs","readrba","dplyr","tidyr","readxl",
                                "jsonlite","testthat","zoo","purrr","stringr")
                      have <- rownames(installed.packages())
                      miss <- setdiff(need, have)
                      if (length(miss)) install.packages(miss,
                        repos = "https://packagemanager.posit.co/cran/__linux__/noble/latest")
                      stopifnot(length(setdiff(need, rownames(installed.packages()))) == 0)'

      - name: Run tests (hermetic, no network)
        env:
          R_LIBS_USER: ${{ runner.temp }}/Library
        run: Rscript tests/run_tests.R

      - name: Run nowcast pipeline
        env:
          R_LIBS_USER: ${{ runner.temp }}/Library
        run: Rscript scripts/run_nowcast.R

      - name: Commit state
        run: |
          git config user.name "ausnow-bot"
          git config user.email "ausnow-bot@users.noreply.github.com"
          git add data site docs
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "nowcast run $(date -u +%F)"
            git pull --rebase origin main
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: nowcast
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
